<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Falsiflow downstream PR proof: AI and RAG claims move from blocked to ready</title>
  <desc id="desc">A proof strip showing two real downstream GitHub PRs. Placeholder AI eval and RAG eval evidence fail strict CI with claim_check_blocked, then source-backed evidence passes with claim_check_ready.</desc>
  <style>
    .sans { font-family: Inter, Segoe UI, Arial, sans-serif; }
    .mono { font-family: SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace; }
    .panel { filter: drop-shadow(0 14px 24px rgba(15, 23, 42, 0.10)); }
    .pulse-blocked { animation: pulseBlocked 8s ease-in-out infinite; }
    .pulse-ready { animation: pulseReady 8s ease-in-out infinite; animation-delay: 3.8s; }
    .trace { stroke-dasharray: 850; stroke-dashoffset: 850; animation: trace 8s ease-in-out infinite; }
    @keyframes pulseBlocked {
      0%, 100% { opacity: 0.96; }
      16%, 30% { opacity: 1; filter: drop-shadow(0 12px 24px rgba(190, 45, 37, 0.28)); }
    }
    @keyframes pulseReady {
      0%, 100% { opacity: 0.96; }
      16%, 30% { opacity: 1; filter: drop-shadow(0 12px 24px rgba(28, 122, 67, 0.28)); }
    }
    @keyframes trace {
      0% { stroke-dashoffset: 850; }
      35% { stroke-dashoffset: 430; }
      70%, 100% { stroke-dashoffset: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .pulse-blocked, .pulse-ready, .trace { animation: none; }
      .trace { stroke-dashoffset: 0; }
    }
  </style>

  <rect width="1280" height="720" rx="28" fill="#f6f8fb"/>
  <rect x="28" y="28" width="1224" height="664" rx="24" fill="#ffffff" stroke="#d8e1ef"/>

  <g class="sans">
    <text x="68" y="82" fill="#122033" font-size="34" font-weight="800">Real downstream PRs: CI blocks unverifiable AI and RAG eval claims</text>
    <text x="68" y="118" fill="#53677f" font-size="20">Two public PRs fail on placeholder evidence, then pass only after source-backed rows and raw files are added.</text>
  </g>

  <g transform="translate(68 146)">
    <rect width="1144" height="86" rx="16" fill="#0f172a"/>
    <g class="mono" font-size="14">
      <circle cx="30" cy="25" r="6" fill="#ff5f57"/>
      <circle cx="50" cy="25" r="6" fill="#ffbd2e"/>
      <circle cx="70" cy="25" r="6" fill="#28c840"/>
      <text x="32" y="55" fill="#e5edf7">$ gh pr view AzurLiu/falsiflow-downstream-ai-eval-demo#1 --web</text>
      <text x="590" y="55" fill="#e5edf7">$ gh pr view AzurLiu/falsiflow-downstream-rag-eval-demo#1 --web</text>
      <text x="32" y="76" fill="#94a3b8">Proof target: evidence completeness in CI, not model quality or safety.</text>
    </g>
  </g>

  <g class="sans">
    <g class="panel" transform="translate(68 274)">
      <rect width="1144" height="150" rx="18" fill="#fff8ed" stroke="#ecc48d"/>
      <text x="24" y="36" fill="#8a4b10" font-size="15" font-weight="800">AI Eval Downstream PR #1</text>
      <text x="24" y="68" fill="#122033" font-size="24" font-weight="800">AI eval claim</text>
      <text x="24" y="98" fill="#5f4630" font-size="16">placeholder evidence enters CI</text>
      <g class="mono" font-size="13">
        <rect x="332" y="30" width="212" height="90" rx="12" fill="#ffffff" stroke="#efd2ae"/>
        <text x="350" y="58" fill="#8a4b10">evidence.csv</text>
        <text x="350" y="82" fill="#b45309">dataset_pending</text>
        <text x="350" y="104" fill="#64748b">raw output missing</text>
      </g>
      <path class="trace" d="M560 75 H690" fill="none" stroke="#aebdcd" stroke-width="6" stroke-linecap="round"/>
      <g class="pulse-blocked">
        <rect x="710" y="30" width="176" height="90" rx="12" fill="#fff1f0" stroke="#eda8a1"/>
        <text x="728" y="58" fill="#9b2d24" font-size="14" font-weight="800">blocked run</text>
        <text class="mono" x="728" y="82" fill="#9b2d24" font-size="13">claim_check_blocked</text>
        <text class="mono" x="728" y="104" fill="#64748b" font-size="13">26711652990</text>
      </g>
      <g class="pulse-ready">
        <rect x="914" y="30" width="198" height="90" rx="12" fill="#f0fbf4" stroke="#a8d8b4"/>
        <text x="932" y="58" fill="#205e35" font-size="14" font-weight="800">ready run</text>
        <text class="mono" x="932" y="82" fill="#205e35" font-size="13">claim_check_ready</text>
        <text class="mono" x="932" y="104" fill="#64748b" font-size="13">26711669112</text>
      </g>
    </g>

    <g class="panel" transform="translate(68 444)">
      <rect width="1144" height="150" rx="18" fill="#eef6ff" stroke="#a7cdf7"/>
      <text x="24" y="36" fill="#1d5a9e" font-size="15" font-weight="800">RAG Eval Downstream PR #1</text>
      <text x="24" y="68" fill="#122033" font-size="24" font-weight="800">RAG eval claim</text>
      <text x="24" y="98" fill="#314d68" font-size="16">source-backed citations required</text>
      <g class="mono" font-size="13">
        <rect x="332" y="30" width="212" height="90" rx="12" fill="#ffffff" stroke="#c2dcf4"/>
        <text x="350" y="58" fill="#1d5a9e">rag_quality_gate</text>
        <text x="350" y="82" fill="#b45309">eval_set_pending</text>
        <text x="350" y="104" fill="#64748b">source export missing</text>
      </g>
      <path class="trace" d="M560 75 H690" fill="none" stroke="#aebdcd" stroke-width="6" stroke-linecap="round"/>
      <g class="pulse-blocked">
        <rect x="710" y="30" width="176" height="90" rx="12" fill="#fff1f0" stroke="#eda8a1"/>
        <text x="728" y="58" fill="#9b2d24" font-size="14" font-weight="800">blocked run</text>
        <text class="mono" x="728" y="82" fill="#9b2d24" font-size="13">claim_check_blocked</text>
        <text class="mono" x="728" y="104" fill="#64748b" font-size="13">26721829145</text>
      </g>
      <g class="pulse-ready">
        <rect x="914" y="30" width="198" height="90" rx="12" fill="#f0fbf4" stroke="#a8d8b4"/>
        <text x="932" y="58" fill="#205e35" font-size="14" font-weight="800">ready run</text>
        <text class="mono" x="932" y="82" fill="#205e35" font-size="13">claim_check_ready</text>
        <text class="mono" x="932" y="104" fill="#64748b" font-size="13">26721856616</text>
      </g>
    </g>
  </g>

  <g class="sans" transform="translate(68 622)">
    <rect width="1144" height="46" rx="14" fill="#f8fafc" stroke="#d9e2ef"/>
    <text x="24" y="29" fill="#122033" font-size="16" font-weight="800">Shareable proof strip</text>
    <text x="230" y="29" fill="#53677f" font-size="14">AI blocked 26711652990 -> ready 26711669112 | RAG blocked 26721829145 -> ready 26721856616</text>
  </g>

  <text class="mono" x="68" y="692" fill="#64748b" font-size="13">Boundary: claim_check_ready means the evidence package is complete enough for review. It does not prove the model is good, safe, or shippable.</text>
</svg>
