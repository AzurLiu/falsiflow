name: Falsiflow Pages Demo

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "falsiflow/**"
      - "scripts/falsiflow.py"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/falsiflow-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build public demo package
        run: |
          python scripts/falsiflow.py demo-package \
            --out-dir public_demo \
            --force \
            --json > /tmp/falsiflow_demo_package.json
          cp /tmp/falsiflow_demo_package.json public_demo/demo_package_summary.stdout.json
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public_demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
