name: Falsiflow Pages Demo

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/falsiflow-pages.yml"
      - "falsiflow/**"
      - "scripts/falsiflow.py"
      - "pyproject.toml"
      - "docs/public_demo/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repository
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "+${GITHUB_REF}:${GITHUB_REF}"
          git checkout --detach "${GITHUB_SHA}"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Build public demo package
        run: |
          python scripts/falsiflow.py demo-package \
            --out-dir public_demo \
            --force \
            --json > /tmp/falsiflow_demo_package.json
          cp /tmp/falsiflow_demo_package.json public_demo/demo_package_summary.stdout.json
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public_demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
