name: Falsiflow Downstream Product Metric Smoke

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  claim-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Falsiflow product metric claim gate
        id: falsiflow
        uses: AzurLiu/falsiflow@v0.1.35
        with:
          mode: claim-check
          project-dir: falsiflow_product_metric
          evidence: falsiflow_product_metric/evidence.csv
          out-dir: data/falsiflow/product_metric_smoke
          strict: "true"

      - name: Upload Falsiflow product metric reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: falsiflow-downstream-product-metric-smoke
          path: |
            ${{ steps.falsiflow.outputs.summary-json }}
            ${{ steps.falsiflow.outputs.summary-md }}
            data/falsiflow/product_metric_smoke/evidence_bundle.zip
            data/falsiflow/product_metric_smoke/evidence_bundle_verify.md
