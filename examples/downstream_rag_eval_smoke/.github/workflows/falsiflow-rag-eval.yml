name: Falsiflow Downstream RAG Eval Smoke

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  claim-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Falsiflow RAG eval claim gate
        id: falsiflow
        uses: AzurLiu/falsiflow@v0.1.32
        with:
          mode: claim-check
          project-dir: falsiflow_rag_eval
          evidence: falsiflow_rag_eval/evidence.csv
          out-dir: data/falsiflow/rag_eval_smoke
          strict: "true"

      - name: Upload Falsiflow RAG eval reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: falsiflow-downstream-rag-eval-smoke
          path: |
            ${{ steps.falsiflow.outputs.summary-json }}
            ${{ steps.falsiflow.outputs.summary-md }}
            data/falsiflow/rag_eval_smoke/evidence_bundle.zip
            data/falsiflow/rag_eval_smoke/evidence_bundle_verify.md
